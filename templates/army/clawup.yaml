stackName: team-a
provider: hetzner
region: ash
instanceType: cpx41
ownerName: Stepan
timezone: PST (America/Los_Angeles)
workingHours: 9am-6pm
userNotes: No additional notes provided yet.
templateVars:
  LINEAR_TEAM: AGE
  GITHUB_REPO: https://github.com/stepandel/clawup
  OWNER_NAME: Stepan
  TIMEZONE: PST (America/Los_Angeles)
  WORKING_HOURS: 9am-6pm
  USER_NOTES: No additional notes provided yet.
secrets:
  tailscaleAuthKey: ${env:TAILSCALE_AUTH_KEY}
  tailnetDnsName: ${env:TAILNET_DNS_NAME}
  tailscaleApiKey: ${env:TAILSCALE_API_KEY}
  hcloudToken: ${env:HCLOUD_TOKEN}
  braveApiKey: ${env:BRAVE_API_KEY}
  anthropicApiKey: ${env:ANTHROPIC_API_KEY}
hooks:
  preStart: |
    #!/bin/sh
    set -e
    # Pre-clone the working repo so agents have it from first boot.
    cd /home/ubuntu
    if [ ! -d "workspace-repo" ]; then
      echo "Cloning $GITHUB_REPO..." >&2
      gh repo clone "$GITHUB_REPO" workspace-repo 2>&1 >&2
      echo "✓ Repository cloned" >&2
    else
      echo "Repository already cloned, pulling latest..." >&2
      cd workspace-repo && git pull --ff-only 2>&1 >&2
    fi

agents:
  - identity: ./pm
  - identity: ./eng
  - identity: ./tester
