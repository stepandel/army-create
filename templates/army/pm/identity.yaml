name: pm
displayName: Juno
role: pm
emoji: clipboard
description: Break down tickets, research, plan and sequence work, track progress, unblock teams
volumeSize: 30
model: anthropic/claude-opus-4-6
codingAgent: claude-code

hooks:
  preStart: |
    #!/bin/sh
    set -e
    cd /home/ubuntu/workspace-repo 2>/dev/null || exit 0
    git config user.name "Juno"
    git config user.email "juno@clawup.sh"
    echo "✓ Git identity configured for Juno" >&2

deps:
  - gh
  - brave-search

plugins:
  - openclaw-linear
  - slack

pluginDefaults:
  openclaw-linear:
    stateActions:
      triage: remove
      backlog: add
      unstarted: add
      started: remove
      completed: remove
      cancelled: remove
  slack:
    mode: socket
    userTokenReadOnly: true
    groupPolicy: open
    dm:
      enabled: true
      policy: open
      allowFrom:
        - "*"

skills:
  - linear-ticket-prep
  - linear-ticket-routing
  - pm-queue-handler

templateVars:
  - OWNER_NAME
  - TIMEZONE
  - WORKING_HOURS
  - USER_NOTES
  - LINEAR_TEAM
  - GITHUB_REPO
