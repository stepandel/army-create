name: tester
displayName: Scout
role: tester
emoji: mag
description: Quality assurance, verification, bug hunting
volumeSize: 30
model: anthropic/claude-opus-4-6
codingAgent: claude-code

hooks:
  preStart: |
    #!/bin/sh
    set -e
    cd /home/ubuntu/workspace-repo 2>/dev/null || exit 0
    git config user.name "Scout"
    git config user.email "scout@clawup.sh"
    echo "✓ Git identity configured for Scout" >&2

deps:
  - gh
  - brave-search

plugins:
  - openclaw-linear
  - slack

pluginDefaults:
  openclaw-linear:
    stateActions:
      triage: remove
      started: add
      completed: remove
      cancelled: remove
  slack:
    mode: socket
    userTokenReadOnly: true
    groupPolicy: open
    dm:
      enabled: true
      policy: open
      allowFrom:
        - "*"

skills:
  - tester-queue-handler

templateVars:
  - OWNER_NAME
  - TIMEZONE
  - WORKING_HOURS
  - USER_NOTES
  - LINEAR_TEAM
  - GITHUB_REPO
